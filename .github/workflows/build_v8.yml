name: Build V8 PIC Libraries

# Run once manually, or whenever you bump the v8 crate version.
# After it runs, your CI workflow downloads the artifact via RUSTY_V8_ARCHIVE.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-v8-linux-x86_64:
    name: V8 PIC — linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get V8 version from Cargo.lock
        id: v8-version
        working-directory: native/math_jax_nif
        run: |
          V8_VERSION=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name == "v8") | .version')
          echo "version=$V8_VERSION" >> "$GITHUB_OUTPUT"
          echo "V8 version: $V8_VERSION"

      - name: Check if asset already exists
        id: check
        run: |
          if gh release view "v8-${{ steps.v8-version.outputs.version }}" \
            --json assets -q '.assets[].name' 2>/dev/null \
            | grep -q "librusty_v8_release_x86_64-unknown-linux-gnu.a"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build V8 from source with PIC
        if: steps.check.outputs.exists != 'true'
        run: |
          mkdir -p v8-out
          docker run --rm \
            -v "${{ github.workspace }}:/io" \
            -v "${{ github.workspace }}/v8-out:/v8-out" \
            -w /io/native/math_jax_nif \
            -e V8_FROM_SOURCE=1 \
            -e "GN_ARGS=v8_monolithic=true v8_monolithic_for_shared_library=true is_component_build=false treat_warnings_as_errors=false symbol_level=0" \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -c '
              set -ex
              dnf install -y glib2-devel libffi-devel clang-devel
              curl --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
              cargo build --release
              cp /io/native/math_jax_nif/target/release/gn_out/obj/librusty_v8.a \
                /v8-out/librusty_v8_release_x86_64-unknown-linux-gnu.a
              ls -lh /v8-out/
            '

      - name: Verify artifact
        if: steps.check.outputs.exists != 'true'
        run: |
          ls -lh v8-out/
          file v8-out/librusty_v8_release_x86_64-unknown-linux-gnu.a

      - name: Create release and upload
        if: steps.check.outputs.exists != 'true'
        run: |
          gh release create "v8-${{ steps.v8-version.outputs.version }}" \
            --title "V8 ${{ steps.v8-version.outputs.version }} PIC Binaries" \
            --notes "Pre-built V8 static libraries with PIC/shared-library support for NIF builds." \
            --prerelease \
            2>/dev/null || true

          gh release upload "v8-${{ steps.v8-version.outputs.version }}" \
            v8-out/librusty_v8_release_x86_64-unknown-linux-gnu.a \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  build-v8-linux-aarch64:
    name: V8 PIC — linux aarch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get V8 version from Cargo.lock
        id: v8-version
        working-directory: native/math_jax_nif
        run: |
          V8_VERSION=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name == "v8") | .version')
          echo "version=$V8_VERSION" >> "$GITHUB_OUTPUT"
          echo "V8 version: $V8_VERSION"

      - name: Check if asset already exists
        id: check
        run: |
          if gh release view "v8-${{ steps.v8-version.outputs.version }}" \
            --json assets -q '.assets[].name' 2>/dev/null \
            | grep -q "librusty_v8_release_aarch64-unknown-linux-gnu.a"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build V8 from source with PIC
        if: steps.check.outputs.exists != 'true'
        run: |
          mkdir -p v8-out
          docker run --rm \
            -v "${{ github.workspace }}:/io" \
            -v "${{ github.workspace }}/v8-out:/v8-out" \
            -w /io/native/math_jax_nif \
            -e V8_FROM_SOURCE=1 \
            -e CLANG_BASE_PATH=/usr \
            -e "GN_ARGS=v8_monolithic=true v8_monolithic_for_shared_library=true is_component_build=false treat_warnings_as_errors=false symbol_level=0" \
            quay.io/pypa/manylinux_2_28_aarch64 \
            bash -c '
              set -ex
              dnf install -y glib2-devel libffi-devel clang clang-devel lld compiler-rt

              # Link clang builtins where V8 expects them
              BUILTINS=$(find /usr/lib*/clang -name "libclang_rt.builtins*.a" 2>/dev/null | head -1)
              if [ -n "$BUILTINS" ]; then
                for VER in $(seq 18 22); do
                  DIR="/usr/lib/clang/${VER}/lib/aarch64-unknown-linux-gnu"
                  mkdir -p "$DIR"
                  ln -sf "$BUILTINS" "$DIR/libclang_rt.builtins.a"
                done
              fi

              curl --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
              cargo build --release
              cp /io/native/math_jax_nif/target/release/gn_out/obj/librusty_v8.a \
                /v8-out/librusty_v8_release_aarch64-unknown-linux-gnu.a
              ls -lh /v8-out/
            '

      - name: Create release and upload
        if: steps.check.outputs.exists != 'true'
        run: |
          gh release create "v8-${{ steps.v8-version.outputs.version }}" \
            --title "V8 ${{ steps.v8-version.outputs.version }} PIC Binaries" \
            --notes "Pre-built V8 static libraries with PIC/shared-library support for NIF builds." \
            --prerelease \
            2>/dev/null || true

          gh release upload "v8-${{ steps.v8-version.outputs.version }}" \
            v8-out/librusty_v8_release_aarch64-unknown-linux-gnu.a \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
