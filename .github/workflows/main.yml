name: MathJax CI

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SHELL: sh

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    env:
      MATHJAX_BUILD: "true"
      RUSTY_V8_ARCHIVE: "https://github.com/${{ github.repository }}/releases/download/v8-139.0.0/librusty_v8_release_x86_64-unknown-linux-gnu.a"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.1"
      - name: Get V8 version
        if: matrix.v8_archive_suffix != ''
        id: v8-version
        working-directory: native/math_jax_nif
        run: |
          V8_VERSION=$(cargo metadata --format-version 1 | jq -r \
            '.packages[] | select(.name == "v8") | .version')
          echo "version=$V8_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download PIC V8 archive
        if: matrix.v8_archive_suffix != ''
        run: |
          mkdir -p v8-prebuilt
          curl -L -f -o v8-prebuilt/librusty_v8.a \
            "https://github.com/${{ github.repository }}/releases/download/v8-${{ steps.v8-version.outputs.version }}/librusty_v8_release_${{ matrix.v8_archive_suffix }}.a"
          ls -lh v8-prebuilt/
      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-v2-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-v2-
      - name: Install dependencies
        run: mix deps.get
      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-mix-v2-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-v2-
      - name: Mix Formatter
        run: mix format --check-formatted
      - name: Check for compiler warnings
        run: mix compile --warnings-as-errors
      - name: Credo strict checks
        run: mix credo --strict
      - name: Doctor documentation checks
        run: mix doctor

  unit_test:
    name: Run ExUnit tests
    runs-on: ubuntu-latest

    env:
      MATHJAX_BUILD: "true"
      RUSTY_V8_ARCHIVE: "https://github.com/${{ github.repository }}/releases/download/v8-139.0.0/librusty_v8_release_x86_64-unknown-linux-gnu.a"

    strategy:
      matrix:
        elixir: ["1.17"]
        otp: ["25", "26", "27"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Get V8 version
        if: matrix.v8_archive_suffix != ''
        id: v8-version
        working-directory: native/math_jax_nif
        run: |
          V8_VERSION=$(cargo metadata --format-version 1 | jq -r \
            '.packages[] | select(.name == "v8") | .version')
          echo "version=$V8_VERSION" >> "$GITHUB_OUTPUT"
      - name: Download PIC V8 archive
        if: matrix.v8_archive_suffix != ''
        run: |
          mkdir -p v8-prebuilt
          curl -L -f -o v8-prebuilt/librusty_v8.a \
            "https://github.com/${{ github.repository }}/releases/download/v8-${{ steps.v8-version.outputs.version }}/librusty_v8_release_${{ matrix.v8_archive_suffix }}.a"
          ls -lh v8-prebuilt/
      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-v2-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-v2-
      - name: Install dependencies
        run: mix deps.get
      - name: ExUnit tests
        run: mix coveralls.github
