name: MathJax CI

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SHELL: sh
  RUSTLER_FORCE_BUILD: "true"
  V8_FROM_SOURCE: "1"
  PRINT_GN_ARGS: "1"
  CC: clang
  CXX: clang++
  GN_ARGS: "is_component_build=true"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install V8 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          clang lld \
          ninja-build \
          python3 \
          pkg-config \
          libglib2.0-dev \
          libatk1.0-dev \
          libatk-bridge2.0-dev \
          libpango1.0-dev \
          libdrm-dev \
          libxkbcommon-dev \
          libdbus-1-dev \
          libatspi2.0-dev \
          libxcomposite-dev \
          libxdamage-dev \
          libxrandr-dev \
          libgbm-dev \
          libcups2-dev \
          libnss3-dev \
          libxss-dev
      - name: Cache V8 build
        uses: actions/cache@v4
        with:
          path: |
            native/math_jax_nif/target/release/gn_out
            native/math_jax_nif/target/release/build/v8-*
          # v2 suffix forces a fresh build — bump when changing GN_ARGS
          key: v8-tls-v2-${{ matrix.target || 'x86_64' }}-${{ hashFiles('native/math_jax_nif/Cargo.lock') }}
      - name: Ensure clean GN state
        run: |
          # Force GN to regenerate args.gn with our TLS fix
          rm -rf native/math_jax_nif/target/release/gn_out/args.gn
          rm -rf native/math_jax_nif/target/release/gn_out/build.ninja
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.1"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-v2-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-v2-
      - name: Install dependencies
        run: mix deps.get
      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-mix-v2-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-v2-
      - name: Mix Formatter
        run: mix format --check-formatted
      - name: Check for compiler warnings
        run: mix compile --warnings-as-errors
      - name: Credo strict checks
        run: mix credo --strict
      - name: Doctor documentation checks
        run: mix doctor

  unit_test:
    name: Run ExUnit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        elixir: ["1.17"]
        otp: ["25", "26", "27"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install V8 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libc++-dev libc++abi-dev
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-v2-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-v2-
      - name: Install dependencies
        run: mix deps.get
      - name: ExUnit tests
        run: mix coveralls.github
