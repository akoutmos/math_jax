name: Precompile NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_nif_linux:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        nif:
          - { version: "2.15", feature: "2_15" }
          - { version: "2.16", feature: "2_16" }
        job:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            v8_archive_url: "https://github.com/akoutmos/math_jax/releases/download/v8-139.0.0/librusty_v8_release_x86_64-unknown-linux-gnu.a"
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            v8_archive_url: "https://github.com/akoutmos/math_jax/releases/download/v8-139.0.0/librusty_v8_release_aarch64-unknown-linux-gnu.a"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Download PIC V8 archive
        run: |
          mkdir -p v8-prebuilt
          curl -L -f -o v8-prebuilt/librusty_v8.a "${{ matrix.job.v8_archive_url }}"
          ls -lh v8-prebuilt/

      - name: Build NIF
        working-directory: native/math_jax_nif
        run: cargo build --release --features nif_version_${{ matrix.nif.feature }}
        env:
          RUSTY_V8_ARCHIVE: ${{ github.workspace }}/v8-prebuilt/librusty_v8.a

      - name: Package artifact
        run: |
          TARGET="${{ matrix.job.target }}"

          LIB_FILE=$(find native/math_jax_nif/target -maxdepth 3 -name "*.so" -type f | head -1)

          # Rename to what rustler_precompiled expects
          LIB_DIR=$(dirname "$LIB_FILE")
          if [ ! -f "${LIB_DIR}/libmath_jax_nif.so" ]; then
            cp "$LIB_FILE" "${LIB_DIR}/libmath_jax_nif.so"
          fi

          ARTIFACT_NAME="libmath_jax_nif-v${PROJECT_VERSION}-nif-${{ matrix.nif.version }}-${TARGET}.so"

          mkdir -p artifacts
          tar -czf "artifacts/${ARTIFACT_NAME}.tar.gz" -C "${LIB_DIR}" "libmath_jax_nif.so"
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.job.target }}-nif${{ matrix.nif.version }}
          path: artifacts/*.tar.gz
          if-no-files-found: error

  build_nif_other:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        nif:
          - { version: "2.15", feature: "2_15" }
          - { version: "2.16", feature: "2_16" }
        job:
          - os: macos-15
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-gnu
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Build NIF
        working-directory: native/math_jax_nif
        run: cargo build --release --features nif_version_${{ matrix.nif.feature }}

      - name: Package artifact
        shell: bash
        run: |
          TARGET="${{ matrix.job.target }}"

          if [[ "$TARGET" == *"windows"* ]]; then
            LIB_FILE=$(find native/math_jax_nif/target -maxdepth 3 -name "*.dll" -type f | head -1)
            INNER_NAME="math_jax_nif.dll"
            EXT="dll"
            PREFIX=""
          else
            LIB_FILE=$(find native/math_jax_nif/target -maxdepth 3 \( -name "*.dylib" -o -name "*.so" \) -type f | head -1)
            INNER_NAME="libmath_jax_nif.so"
            EXT="so"
            PREFIX="lib"
          fi

          if [ -z "$LIB_FILE" ]; then
            echo "ERROR: No shared library found"
            find native/math_jax_nif/target/release -type f | head -20
            exit 1
          fi

          echo "Found: $LIB_FILE"
          LIB_DIR=$(dirname "$LIB_FILE")
          if [ ! -f "${LIB_DIR}/${INNER_NAME}" ]; then
            cp "$LIB_FILE" "${LIB_DIR}/${INNER_NAME}"
          fi

          ARTIFACT_NAME="${PREFIX}math_jax_nif-v${PROJECT_VERSION}-nif-${{ matrix.nif.version }}-${TARGET}.${EXT}"

          mkdir -p artifacts
          tar -czf "artifacts/${ARTIFACT_NAME}.tar.gz" -C "${LIB_DIR}" "${INNER_NAME}"
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.job.target }}-nif${{ matrix.nif.version }}
          path: artifacts/*.tar.gz
          if-no-files-found: error

  publish_release:
    name: Publish Release
    needs: [build_nif_linux, build_nif_other]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nif-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
