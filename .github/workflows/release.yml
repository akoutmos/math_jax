name: Precompile NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_nif_linux:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        nif:
          - { version: "2.15", feature: "2_15" }
          - { version: "2.16", feature: "2_16" }
        job:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            v8_archive_url: "https://github.com/akoutmos/math_jax/releases/download/v8-139.0.0/librusty_v8_release_x86_64-unknown-linux-gnu.a"
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            v8_archive_url: "https://github.com/akoutmos/math_jax/releases/download/v8-139.0.0/librusty_v8_release_aarch64-unknown-linux-gnu.a"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Download PIC V8 archive
        run: |
          mkdir -p v8-prebuilt
          curl -L -f -o v8-prebuilt/librusty_v8.a "${{ matrix.job.v8_archive_url }}"
          ls -lh v8-prebuilt/

      - name: Build NIF
        working-directory: native/math_jax_nif
        run: cargo build --release --target ${{ matrix.job.target }} --features nif_version_${{ matrix.nif.feature }}
        env:
          RUSTY_V8_ARCHIVE: ${{ github.workspace }}/v8-prebuilt/librusty_v8.a

      - name: Package artifact
        run: |
          TARGET="${{ matrix.job.target }}"

          echo "=== Files matching math_jax_nif ==="
          ls -lh "native/math_jax_nif/target/${TARGET}/release/"*math_jax_nif* 2>/dev/null || true

          LIB_FILE="native/math_jax_nif/target/${TARGET}/release/libmath_jax_nif.so"

          if [ ! -f "$LIB_FILE" ]; then
            echo "ERROR: NIF not found at $LIB_FILE"
            find native/math_jax_nif/target -name "*math_jax*" -type f 2>/dev/null
            exit 1
          fi

          echo "Found: $LIB_FILE"
          echo "Size: $(ls -lh "$LIB_FILE" | awk '{print $5}')"
          file "$LIB_FILE"

          INNER_NAME="libmath_jax_nif-v${PROJECT_VERSION}-nif-${{ matrix.nif.version }}-${TARGET}.so"

          mkdir -p artifacts
          cp "$LIB_FILE" "artifacts/${INNER_NAME}"
          tar -czf "artifacts/${INNER_NAME}.tar.gz" -C artifacts "${INNER_NAME}"
          rm "artifacts/${INNER_NAME}"
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.job.target }}-nif${{ matrix.nif.version }}
          path: artifacts/*.tar.gz
          if-no-files-found: error

  build_nif_other:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        nif:
          - { version: "2.15", feature: "2_15" }
          - { version: "2.16", feature: "2_16" }
        job:
          - os: macos-15
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-gnu
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Build NIF
        working-directory: native/math_jax_nif
        run: cargo build --release --target ${{ matrix.job.target }} --features nif_version_${{ matrix.nif.feature }}

      - name: Package artifact
        shell: bash
        run: |
          TARGET="${{ matrix.job.target }}"

          echo "=== Files matching math_jax_nif ==="
          ls -lh "native/math_jax_nif/target/${TARGET}/release/"*math_jax_nif* 2>/dev/null || true

          if [[ "$TARGET" == *"windows"* ]]; then
            LIB_FILE="native/math_jax_nif/target/${TARGET}/release/math_jax_nif.dll"
            EXT="dll"
            PREFIX=""
          elif [[ "$TARGET" == *"apple"* ]]; then
            LIB_FILE="native/math_jax_nif/target/${TARGET}/release/libmath_jax_nif.dylib"
            EXT="so"
            PREFIX="lib"
          else
            LIB_FILE="native/math_jax_nif/target/${TARGET}/release/libmath_jax_nif.so"
            EXT="so"
            PREFIX="lib"
          fi

          if [ ! -f "$LIB_FILE" ]; then
            echo "ERROR: NIF not found at $LIB_FILE"
            find native/math_jax_nif/target -name "*math_jax*" -type f 2>/dev/null
            exit 1
          fi

          echo "Found: $LIB_FILE"
          echo "Size: $(ls -lh "$LIB_FILE" | awk '{print $5}')"
          file "$LIB_FILE"

          INNER_NAME="${PREFIX}math_jax_nif-v${PROJECT_VERSION}-nif-${{ matrix.nif.version }}-${TARGET}.${EXT}"

          mkdir -p artifacts
          cp "$LIB_FILE" "artifacts/${INNER_NAME}"
          tar -czf "artifacts/${INNER_NAME}.tar.gz" -C artifacts "${INNER_NAME}"
          rm "artifacts/${INNER_NAME}"
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.job.target }}-nif${{ matrix.nif.version }}
          path: artifacts/*.tar.gz
          if-no-files-found: error

  publish_release:
    name: Publish Release
    needs: [build_nif_linux, build_nif_other]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nif-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
