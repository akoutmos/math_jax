name: Precompile NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_nif_linux:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16", "2.15"]
        job:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use-cross: false
            v8_archive_url: "https://github.com/akoutmos/math_jax/releases/download/v8-139.0.0/librusty_v8_release_x86_64-unknown-linux-gnu.a"
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use-cross: true
            v8_archive_url: "https://github.com/akoutmos/math_jax/releases/download/v8-139.0.0/librusty_v8_release_aarch64-unknown-linux-gnu.a"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Download PIC V8 archive
        run: |
          mkdir -p v8-prebuilt
          curl -L -f -o v8-prebuilt/librusty_v8.a "${{ matrix.job.v8_archive_url }}"
          ls -lh v8-prebuilt/

      - name: Build NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: math_jax_nif
          project-version: ${{ env.PROJECT_VERSION }}
          project-dir: native/math_jax_nif
          target: ${{ matrix.job.target }}
          use-cross: ${{ matrix.job.use-cross }}
          nif-version: ${{ matrix.nif }}
        env:
          RUSTY_V8_ARCHIVE: ${{ github.workspace }}/v8-prebuilt/librusty_v8.a

      - name: Find built artifacts
        run: find _build -name "math_jax_nif-*" -type f 2>/dev/null || find . -name "math_jax_nif-*.tar.gz" -type f

      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

  build_nif_other:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16", "2.15"]
        job:
          - os: macos-15
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-gnu
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Build NIF
        env:
          RUSTLER_NIF_VERSION: ${{ matrix.nif }}
        run: |
          mix rustler_precompiled.build MathJax.Native --target ${{ matrix.job.target }} --nif-version ${{ matrix.nif }}

      - name: Find built artifacts
        shell: bash
        run: find . -name "*.tar.gz" -type f

      - uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.job.target }}-nif${{ matrix.nif }}
          path: "**/*math_jax*.tar.gz"
          if-no-files-found: error

  publish_release:
    name: Publish Release
    needs: [build_nif_linux, build_nif_other]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nif-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
